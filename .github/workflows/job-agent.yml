name: Job Copilot Agent Continuous Search and Apply

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      note:
        description: 'Manual trigger reason'
        required: false

concurrency:
  group: job-fetcher
  cancel-in-progress: true
jobs:
  job-search:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install requests google-genai
      - name: Run Continuous Job Search and Apply
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          LINKEDIN_EMAIL: patelharsh513@gmail.com
          LINKEDIN_PASSWORD: ${{ secrets.LINKEDIN_PASSWORD }}
          MIN_SCORE: '60'
        run: python3 scripts/job_agent.py
      - name: Push jobs via API
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'EOF'
import os, json, base64, urllib.request
from datetime import datetime, timezone
token = os.environ['GITHUB_TOKEN']
repo = os.environ['GITHUB_REPOSITORY']
path = 'docs/data/jobs.json'
if not os.path.exists(path):
    print('No jobs.json found'); exit(0)
with open(path, 'rb') as f:
    content = base64.b64encode(f.read()).decode()
req = urllib.request.Request(
    f'https://api.github.com/repos/{repo}/contents/{path}',
    headers={'Authorization': f'token {token}', 'Accept': 'application/json'})
sha = json.loads(urllib.request.urlopen(req).read())['sha']
msg = f'Jobs: {datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M UTC")}'
body = json.dumps({'message': msg, 'content': content, 'sha': sha}).encode()
req2 = urllib.request.Request(
    f'https://api.github.com/repos/{repo}/contents/{path}',
    data=body, method='PUT',
    headers={'Authorization': f'token {token}', 'Content-Type': 'application/json'})
try:
    r = json.loads(urllib.request.urlopen(req2).read())
    print('Pushed:', r.get('commit', {}).get('sha', '?')[:8])
except Exception as e:
    print('Push error:', e)
EOF
