name: Job Copilot Agent Continuous Search and Apply

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      note:
        description: 'Manual trigger reason'
        required: false

concurrency:
  group: job-fetcher
  cancel-in-progress: true
jobs:
  job-search:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install requests google-genai
      - name: Run Continuous Job Search and Apply
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          LINKEDIN_EMAIL: patelharsh513@gmail.com
          LINKEDIN_PASSWORD: ${{ secrets.LINKEDIN_PASSWORD }}
          MIN_SCORE: '60'
        run: python3 scripts/job_agent.py
      - name: Push jobs via API
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/push_jobs.py
